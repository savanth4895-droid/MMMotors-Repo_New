services:
  - type: web
    name: mmmotors-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mmmotors
      - key: JWT_SECRET_KEY
        sync: false
      - key: ALLOW_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://mmmotors-frontend.vercel.app
    healthCheckPath: /health
